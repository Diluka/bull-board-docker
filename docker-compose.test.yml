services:
  nginx:
    build: ./test/nginx
    ports:
      - "127.0.0.1::80"
  redis:
    image: redis:alpine
  pipeline-fixture:
    image: redis:alpine
    volumes:
      - ./test/seed-pipeline.sh:/test/seed-pipeline.sh:ro
    entrypoint: ['/bin/sh', '/test/seed-pipeline.sh']
    depends_on:
      - redis
  bull-board:
    build: .
    environment:
      REDIS_HOST: redis
      PROXY_PATH: /app/bull-board/
      PORT: 80
      NODE_ENV: test
      USER_LOGIN: test-user
      USER_PASSWORD: test-password
    depends_on:
      nginx:
        condition: service_started
      pipeline-fixture:
        condition: service_completed_successfully
  sut: # docker hub test entry
    image: curlimages/curl
    volumes:
      - ./test/sut.sh:/test/sut.sh:ro
    entrypoint: ['/bin/sh', '/test/sut.sh']
    depends_on:
      - bull-board
